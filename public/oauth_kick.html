<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kick auth</title>
</head>

<body>

  <script>
    // Handle OAuth callback - extract authorization code from URL
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');
    const error = urlParams.get('error');

    if (error) {
      window.opener?.postMessage(`smplstt_kick_auth_error:${error}`, '*');
    } else if (code && state) {
      // Send code and state back to opener window
      window.opener?.postMessage(`smplstt_kick_auth:${code}:${state}`, '*');
    }

    window.close();
  </script>
</body>

</html>
