# `pnpm tauri build` embeds Vite env at compile time. Configure repo secrets (Settings → Secrets and variables → Actions):
#   SIGIL_TWITCH_CLIENT_ID (or CURSES_TWITCH_CLIENT_ID)
#   SIGIL_TWITCH_CLIENT_SECRET (or CURSES_TWITCH_CLIENT_SECRET) — only if you use a Confidential Twitch app (auth code flow)
#   SIGIL_KICK_CLIENT_ID (or CURSES_KICK_CLIENT_ID), SIGIL_KICK_CLIENT_SECRET (or CURSES_KICK_CLIENT_SECRET)
#   VITE_GOOGLE_FONTS_API_KEY (optional; Google Fonts list in app)
# Optional redirect overrides if OAuth URLs differ from defaults: SIGIL_TWITCH_CLIENT_REDIRECT_LOCAL,
#   SIGIL_TWITCH_IMPLICIT_REDIRECT_LOCAL, SIGIL_KICK_CLIENT_REDIRECT_LOCAL (see .env.example)
name: 'release'

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false

    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 7.28.0
      - uses: SebRollen/toml-action@v1.0.1
        id: version
        with:
          file: 'src-tauri/Cargo.toml'
          field: 'package.version'
      - run: echo ${{steps.version.outputs.value}}
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
      - name: setup pnpm deps
        run: pnpm i
      - name: compile
        run: pnpm tauri build
        env:
          SIGIL_TWITCH_CLIENT_ID: ${{ secrets.SIGIL_TWITCH_CLIENT_ID || secrets.CURSES_TWITCH_CLIENT_ID }}
          SIGIL_TWITCH_CLIENT_SECRET: ${{ secrets.SIGIL_TWITCH_CLIENT_SECRET || secrets.CURSES_TWITCH_CLIENT_SECRET }}
          SIGIL_KICK_CLIENT_ID: ${{ secrets.SIGIL_KICK_CLIENT_ID || secrets.CURSES_KICK_CLIENT_ID }}
          SIGIL_KICK_CLIENT_SECRET: ${{ secrets.SIGIL_KICK_CLIENT_SECRET || secrets.CURSES_KICK_CLIENT_SECRET }}
          VITE_GOOGLE_FONTS_API_KEY: ${{ secrets.VITE_GOOGLE_FONTS_API_KEY }}

      - name: create release
        uses: softprops/action-gh-release@v1
#        if: ${{startsWith(github.ref, 'refs/tags/') }}
        with:
          name: Release ${{steps.version.outputs.value}}
          tag_name: v${{steps.version.outputs.value}}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          # After upgrading Tauri or the bundler, run `pnpm tauri build` locally and confirm paths under
          # src-tauri/target/release/ and bundle/msi/ (WiX may vary MSI filename slightly).
          files: |
            src-tauri/target/release/Sigil.exe
            src-tauri/target/release/bundle/msi/Sigil_${{steps.version.outputs.value}}_x64_en-US.msi
