name: 'release'

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false

    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 7.28.0
      - uses: SebRollen/toml-action@v1.0.1
        id: version
        with:
          file: 'src-tauri/Cargo.toml'
          field: 'package.version'
      - run: echo ${{steps.version.outputs.value}}
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
      - name: setup pnpm deps
        run: pnpm i
      - name: compile
        run: pnpm tauri build
        env:
          # Prefer SIGIL_TWITCH_CLIENT_ID; CI may still only have CURSES_TWITCH_CLIENT_ID from older repo secrets.
          SIGIL_TWITCH_CLIENT_ID: ${{ secrets.SIGIL_TWITCH_CLIENT_ID || secrets.CURSES_TWITCH_CLIENT_ID }}

      - name: create release
        uses: softprops/action-gh-release@v1
#        if: ${{startsWith(github.ref, 'refs/tags/') }}
        with:
          name: Release ${{steps.version.outputs.value}}
          tag_name: v${{steps.version.outputs.value}}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          # After upgrading Tauri or the bundler, run `pnpm tauri build` locally and confirm paths under
          # src-tauri/target/release/ and bundle/msi/ (WiX may vary MSI filename slightly).
          files: |
            src-tauri/target/release/sigil.exe
            src-tauri/target/release/bundle/msi/Sigil_${{steps.version.outputs.value}}_x64_en-US.msi
